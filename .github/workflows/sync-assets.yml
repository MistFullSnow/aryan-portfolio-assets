name: Sync Assets To Sheet

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Asset Manifest
        run: |
          python << 'EOF'
          import os
          import json
          from urllib.parse import quote

          files = []

          OWNER = "MistFullSnow"
          REPO = "aryan-portfolio-assets"
          BRANCH = "main"

          for root, dirs, filenames in os.walk("."):

              # Ignore git files
              if ".git" in root:
                  continue

              for filename in filenames:

                  path = os.path.join(root, filename)

                  # Convert to forward slashes
                  path = path.replace("\\", "/")

                  # Remove leading ./
                  if path.startswith("./"):
                      path = path[2:]

                  ext = filename.split(".")[-1].lower()

                  if ext in ["jpg", "jpeg", "png", "gif", "webp", "svg"]:
                      file_type = "Image"
                  elif ext == "pdf":
                      file_type = "PDF"
                  else:
                      file_type = "Other"

                  folder = os.path.dirname(path)
                  if not folder:
                      folder = "Root"

                  files.append({
                      "name": filename,
                      "type": file_type,
                      "folder": folder,
                      "url": f"https://cdn.jsdelivr.net/gh/{OWNER}/{REPO}@{BRANCH}/{quote(path)}"
                  })

          payload = {"files": files}

          with open("assets.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)

          print(f"Generated {len(files)} assets")
          EOF

      - name: Send To Apps Script
        run: |
          curl \
            -X POST \
            -H "Content-Type: application/json" \
            --data @assets.json \
            "${{ secrets.APPS_SCRIPT_URL }}"
